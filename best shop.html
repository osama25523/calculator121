<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel Matcher Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
    --bg:#0f172a;
    --panel:#111827;
    --panel-2:#0b1220;
    --border:#334155;
    --text:#e5e7eb;
    --muted:#cbd5e1;
    --btn1:#22c55e;
    --btn2:#16a34a;
}
*{box-sizing:border-box}
body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    text-align: center;
    padding: 24px;
    margin: 0;
}
.container {
    max-width: 760px;
    margin: 40px auto;
    background: var(--panel);
    padding: 28px;
    border-radius: 18px;
    border: 1px solid var(--border);
    box-shadow: 0 18px 50px rgba(0,0,0,0.35);
}
h2 {
    margin: 0 0 22px;
    font-size: 30px;
}
p {
    color: var(--muted);
    margin: 18px 0 10px;
    font-weight: 700;
}
input[type="file"] {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: #fff;
    color: #000;
    margin-top: 6px;
}
button {
    padding: 13px 24px;
    margin-top: 22px;
    background: linear-gradient(135deg, var(--btn1), var(--btn2));
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    color: white;
    font-size: 16px;
    transition: transform .2s ease, filter .2s ease;
    box-shadow: 0 10px 24px rgba(34,197,94,0.18);
}
button:hover {
    transform: translateY(-1px);
    filter: brightness(1.05);
}
.card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 14px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Best Shop</h2>

    <div class="card">
        <p>Excel from Export (without any Change)</p>
        <input type="file" id="file1">
    </div>

    <div class="card">
        <p>Excel (1st coloum Sku+ 2nd Coloum Active or not (T or F))</p>
        <input type="file" id="file2">
    </div>

    <button onclick="processFiles()">Process &amp; Export</button>
</div>

<script>
function processFiles() {
    const file1 = document.getElementById('file1').files[0];
    const file2 = document.getElementById('file2').files[0];

    if (!file1 || !file2) {
        alert("Please upload both files.");
        return;
    }

    const reader1 = new FileReader();
    const reader2 = new FileReader();

    reader1.onload = function(e1) {
        const wb1 = XLSX.read(e1.target.result, { type: 'binary' });
        const sheet1 = XLSX.utils.sheet_to_json(wb1.Sheets[wb1.SheetNames[0]], { header: 1 });

        reader2.onload = function(e2) {
            const wb2 = XLSX.read(e2.target.result, { type: 'binary' });
            let sheet2 = XLSX.utils.sheet_to_json(wb2.Sheets[wb2.SheetNames[0]], { header: 1 });

            // Step 1: Matching & filtering
            let result = [];

            sheet2.forEach(row2 => {
                let key = row2[0];
                let match = sheet1.find(r => r[9] == key);

                if (match) {
                    row2[2] = match[7]; // put column 8 from file1 into column 3 in file2
                    result.push(row2);
                }
            });

            // Step 2: Swap column 2 and 3
            result = result.map(row => {
                let temp = row[1];
                row[1] = row[2];
                row[2] = temp;
                return row;
            });

            // Step 3: Convert true/false in column 3
            result = result.map(row => {
                if (row[2] === true) row[2] = "";
                if (row[2] === false) row[2] = 0;
                return row;
            });

            // Step 4: Add two empty rows at top
            result.unshift([]);
            result.unshift([]);

            // Export
            const ws = XLSX.utils.aoa_to_sheet(result);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Updated");

            XLSX.writeFile(wb, "updated_file.xlsx");
        };

        reader2.readAsBinaryString(file2);
    };

    reader1.readAsBinaryString(file1);
}
</script>

</body>
</html>
