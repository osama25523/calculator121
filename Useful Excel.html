<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Useful Excel</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      color: #e2e8f0;
      min-height: 100vh;
    }

    .top-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.35);
      color: white;
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 14px;
      font-weight: bold;
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      transition: 0.25s;
      z-index: 999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .top-btn:hover {
      transform: translateY(-2px) scale(1.03);
      background: rgba(255,255,255,0.12);
    }

    .container {
      width: min(1100px, 92%);
      margin: 80px auto 40px;
    }

    .hero {
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 28px;
      padding: 30px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.28);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 4vw, 48px);
      color: #f8fafc;
    }

    .subtitle {
      margin: 0;
      color: #cbd5e1;
      font-size: 16px;
      line-height: 1.8;
    }

    .grid {
      margin-top: 30px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }

    .excel-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: rgba(30, 41, 59, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 22px;
      padding: 22px;
      transition: 0.25s ease;
      box-shadow: 0 12px 28px rgba(0,0,0,0.18);
      position: relative;
      overflow: hidden;
    }

    .excel-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(56,189,248,0.10), rgba(34,197,94,0.08));
      opacity: 0;
      transition: 0.25s;
    }

    .excel-card:hover::before {
      opacity: 1;
    }

    .excel-card:hover {
      transform: translateY(-4px);
      border-color: rgba(56, 189, 248, 0.35);
    }

    .icon {
      font-size: 34px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .desc {
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.8;
      position: relative;
      z-index: 1;
    }

    .tag {
      display: inline-block;
      margin-top: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color: #7dd3fc;
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.22);
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <a href="Market.html" class="top-btn">⬅ Market</a>

  <div class="container">
    <div class="hero">
      <h1>Useful Excel</h1>
      <p class="subtitle">
        اختر صفحة الإكسل اللي بدك تفتحها من هون.
      </p>

      <div class="grid">
        <a href="CityStore.html" class="excel-card">
          <div class="icon">📊</div>
          <div class="title">City Store</div>
          <div class="desc">
            صفحة خاصة بملفات City Store.
          </div>
          <div class="tag">Excel Tool</div>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
