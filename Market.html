  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #fff1c4; /* ✅ الخلفية الجديدة */
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #111;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 1000px;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 45px;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #fff, 0 0 25px #ffcc00;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #111;
      padding: 10px 20px;
      border-radius: 12px;
      color: #ffcc00;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 0 10px #ffcc00;
      z-index: 2;
    }

    .back-btn:hover {
      background: #ffcc00;
      color: #000;
      transform: scale(1.1);
    }

    .left-buttons {
      position: fixed;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 2;
    }

    .sale-btn {
      background: #111;
      color: #ffcc00;
      padding: 16px 26px;
      border-radius: 18px;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
      box-shadow: 0 0 15px #ffcc00;
      transition: 0.3s;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 10px #ffcc00; }
      50% { box-shadow: 0 0 25px #ffcc00, 0 0 50px #ff9900; }
      100% { box-shadow: 0 0 10px #ffcc00; }
    }

    .sale-btn:hover {
      background: #ffcc00;
      color: #000;
      transform: scale(1.1);
      animation: none;
    }

    .excel-btn {
      background: #111;
      color: #00ff88;
      padding: 14px 22px;
      border-radius: 15px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 12px #00ff88;
      transition: 0.3s;
    }

    .excel-btn:hover {
      background: #00ff88;
      color: #000;
      transform: scale(1.1);
      box-shadow: 0 0 20px #00ff88, 0 0 40px #00cc66;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 20px;
    }

    .card {
      height: 120px;
      background: #fff;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      color: #111;
      font-size: 16px;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }

    .card i {
      font-size: 26px;
      margin-bottom: 6px;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ffcc00, #ff9900);
      left: 0;
      top: 0;
      transition: 0.4s;
      z-index: 0;
    }

    .card:hover::before {
      width: 100%;
    }

    .card:hover {
      color: #000;
      transform: translateY(-10px) scale(1.08);
      box-shadow: 0 0 20px #ffcc00, 0 0 40px #ff9900;
    }

    .card span, .card i {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
