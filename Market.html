<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Storats</title>
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    .back-btn {
  position: fixed;
  top: 20px;
  left: 20px;
  background: rgba(0,0,0,0.4);
  padding: 10px 18px;
  border-radius: 12px;
  color: white;
  text-decoration: none;
  font-weight: bold;
  backdrop-filter: blur(8px);
  transition: 0.3s;
  border: 1px solid rgba(255,255,255,0.2);
}

.back-btn:hover {
  background: rgba(255,255,255,0.2);
  transform: scale(1.05);
}
    body {
      <a href="index.html" class="back-btn">⬅ Discount & Sale Price</a>
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 900px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }

    .card {
      height: 120px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      color: white;
      font-size: 20px;
      font-weight: bold;
      transition: 0.3s;
      border: 2px solid transparent;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.05);
      background: rgba(255, 255, 255, 0.2);
    }

    /* تمييز كرمل */
    .karmal {
      border-color: #ffb347;
    }

    /* باقي الستورز */
    .store {
      border-color: #00c6ff;
    }

  </style>
</head>

<body>
<a href="index.html" class="back-btn">⬅ Discount & Sale Price</a>
  <div class="container">
    <h1>Stores</h1>

    <div class="grid">
      <a href="Karmel.html" class="card karmel">Karmel</a>

      <a href="store1.html" class="card store">Store 1</a>
      <a href="Shoneez.html" class="card store">Shoneez</a>
      <a href="store3.html" class="card store">Store 3</a>
      <a href="store4.html" class="card store">Store 4</a>
      <a href="store5.html" class="card store">Store 5</a>
      <a href="store6.html" class="card store">Store 6</a>
      <a href="store7.html" class="card store">Store 7</a>
    </div>

  </div>

</body>
</html>
