<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al Mutasaweq</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      min-height: 100vh;
    }

    .top-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.35);
      color: white;
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 14px;
      font-weight: bold;
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      transition: 0.25s;
      z-index: 999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .top-btn:hover {
      transform: translateY(-2px) scale(1.03);
      background: rgba(255,255,255,0.12);
    }

    .container {
      width: min(1150px, 92%);
      margin: 32px auto;
      padding-top: 40px;
    }

    .hero {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 42px);
      color: #f8fafc;
    }

    .subtitle {
      margin: 0 0 24px;
      color: #cbd5e1;
      line-height: 1.8;
      font-size: 15px;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 20px;
      margin-top: 22px;
    }

    .tool-card {
      background: rgba(30, 41, 59, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }

    .tool-title {
      margin: 0 0 10px;
      font-size: 24px;
      color: #f8fafc;
    }

    .tool-desc {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.8;
      margin-bottom: 18px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .upload-label, .btn {
      border: none;
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .upload-label {
      background: #38bdf8;
      color: #082f49;
    }

    .btn {
      background: #22c55e;
      color: white;
    }

    .upload-label:hover, .btn:hover {
      transform: translateY(-1px);
    }

    .btn:disabled {
      background: #475569;
      cursor: not-allowed;
      transform: none;
    }

    input[type="file"] {
      display: none;
    }

    .status {
      margin-top: 12px;
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 14px;
      padding: 12px 14px;
      min-height: 48px;
      font-size: 14px;
      line-height: 1.8;
      color: #e2e8f0;
    }

    .success { color: #86efac; }
    .warning { color: #fcd34d; }
    .error { color: #fca5a5; }

    .rules {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(148, 163, 184, 0.08);
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.8;
    }

    .rules b {
      color: #f8fafc;
    }
  </style>
</head>
<body>
  <a href="Market.html" class="top-btn">⬅ Market</a>

  <div class="container">
    <div class="hero">
      <h1>Al Mutasaweq</h1>
      <p class="subtitle">
      </p>

      <div class="tools-grid">
        <div class="tool-card">
          <h2 class="tool-title">Excel 1</h2>
          <div class="tool-desc">
          </div>

          <div class="actions">
            <label class="upload-label" for="file1">📄 Upload Excel</label>
            <input id="file1" type="file" accept=".xlsx,.xls" />
            <button id="export1" class="btn" disabled>⬇ Export</button>
          </div>

          <div id="status1" class="status">Waiting for file...</div>

          <div class="rules">
          </div>
        </div>

        <div class="tool-card">
          <h2 class="tool-title">Fresh</h2>
          <div class="tool-desc">
                   </div>

          <div class="actions">
            <label class="upload-label" for="file2">🥬 Upload Fresh Excel</label>
            <input id="file2" type="file" accept=".xlsx,.xls" />
            <button id="export2" class="btn" disabled>⬇ Export</button>
          </div>

          <div id="status2" class="status">Waiting for file...</div>

          <div class="rules">
            
            <br>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const file1Input = document.getElementById('file1');
    const export1Btn = document.getElementById('export1');
    const status1 = document.getElementById('status1');

    const file2Input = document.getElementById('file2');
    const export2Btn = document.getElementById('export2');
    const status2 = document.getElementById('status2');

    let file1Data = null;
    let file1Name = 'processed_excel_1.xlsx';

    let file2Data = null;
    let file2Name = 'fresh_processed.xlsx';

    function setStatus(el, message, className = '') {
      el.className = 'status ' + className;
      el.innerHTML = message;
    }

    function normalizeSecondColumnValue(value) {
      return String(value ?? '').replace(/٫/g, '.');
    }

    function processBaseSheet(sheet) {
      const data = XLSX.utils.sheet_to_json(sheet, {
        header: 1,
        raw: true,
        defval: ''
      });

      const swapped = data.map(row => {
        const currentRow = Array.isArray(row) ? [...row] : [];
        const temp = currentRow[2];
        currentRow[2] = currentRow[3];
        currentRow[3] = temp;
        return currentRow;
      });

      const afterDelete = swapped.map(row => {
        const currentRow = Array.isArray(row) ? row : [];
        const kept = currentRow.filter((_, index) => index !== 1 && index !== 4);

        while (kept.length < 3) kept.push('');
        return kept.slice(0, 3);
      });

      afterDelete.forEach(row => {
        row[1] = normalizeSecondColumnValue(row[1]);
      });

      const blankRow = ['', '', ''];
      afterDelete.splice(1, 0, blankRow);

      return XLSX.utils.aoa_to_sheet(afterDelete);
    }

    function processFreshSheet(sheet) {
      const baseSheet = processBaseSheet(sheet);

      const data = XLSX.utils.sheet_to_json(baseSheet, {
        header: 1,
        raw: true,
        defval: ''
      });

      for (let i = 2; i < data.length; i++) {
        const row = data[i] || [];
        const firstValue = String(row[0] ?? '');

        if (firstValue !== '') {
          row[0] = 'MQ' + firstValue;
        }
      }

      return XLSX.utils.aoa_to_sheet(data);
    }

    function downloadWorkbook(workbook, filename, bookType) {
      const output = XLSX.write(workbook, {
        bookType,
        type: 'array'
      });

      const blob = new Blob([output], {
        type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
      });

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    file1Input.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      file1Data = null;
      export1Btn.disabled = true;

      if (!file) {
        setStatus(status1, 'Waiting for file...');
        return;
      }

      try {
        file1Name = file.name.replace(/(\.xlsx|\.xls)$/i, '') + '_processed.xlsx';
        file1Data = await file.arrayBuffer();
        export1Btn.disabled = false;
        setStatus(status1, `Loaded: <strong>${file.name}</strong>`, 'success');
      } catch (err) {
        setStatus(status1, 'Could not read the file.', 'error');
      }
    });

    file2Input.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      file2Data = null;
      export2Btn.disabled = true;

      if (!file) {
        setStatus(status2, 'Waiting for file...');
        return;
      }

      try {
        file2Name = file.name.replace(/(\.xlsx|\.xls)$/i, '') + '_fresh_processed.xlsx';
        file2Data = await file.arrayBuffer();
        export2Btn.disabled = false;
        setStatus(status2, `Loaded: <strong>${file.name}</strong>`, 'success');
      } catch (err) {
        setStatus(status2, 'Could not read the file.', 'error');
      }
    });

    export1Btn.addEventListener('click', () => {
      if (!file1Data) return;

      try {
        setStatus(status1, 'Processing file...');
        const workbook = XLSX.read(file1Data, { type: 'array' });
        const newWorkbook = XLSX.utils.book_new();

        workbook.SheetNames.forEach(sheetName => {
          const processedSheet = processBaseSheet(workbook.Sheets[sheetName]);
          XLSX.utils.book_append_sheet(newWorkbook, processedSheet, sheetName);
        });

        downloadWorkbook(newWorkbook, file1Name, 'xlsx');
        setStatus(status1, '✅ File exported successfully.', 'success');
      } catch (err) {
        console.error(err);
        setStatus(status1, 'An error occurred during export.', 'error');
      }
    });

    export2Btn.addEventListener('click', () => {
      if (!file2Data) return;

      try {
        setStatus(status2, 'Processing file...');
        const workbook = XLSX.read(file2Data, { type: 'array' });
        const newWorkbook = XLSX.utils.book_new();

        workbook.SheetNames.forEach(sheetName => {
          const processedSheet = processFreshSheet(workbook.Sheets[sheetName]);
          XLSX.utils.book_append_sheet(newWorkbook, processedSheet, sheetName);
        });

        downloadWorkbook(newWorkbook, file2Name, 'xlsx');
        setStatus(status2, '✅ Fresh file exported successfully.', 'success');
      } catch (err) {
        console.error(err);
        setStatus(status2, 'An error occurred during export.', 'error');
      }
    });
  </script>
</body>
</html>
