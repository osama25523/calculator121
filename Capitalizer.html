<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Capitalize Text</title>
  <style>
    *{box-sizing:border-box}

    :root{
      --text:#fff;
      --shadow:0 30px 80px rgba(0,0,0,0.6);
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:system-ui,sans-serif;
      color:var(--text);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:24px;
      overflow:hidden;
      position:relative;
      background:linear-gradient(135deg,#002b1a,#005c33,#00ff88);
    }

    /* 🔥 + ⚡ خلفية خيالية */
    body::before{
      content:"";
      position:absolute;
      width:120%;
      height:120%;
      background:
        radial-gradient(circle, rgba(0,255,150,0.35), transparent 40%),
        radial-gradient(circle, rgba(0,180,100,0.25), transparent 50%);
      animation:moveBg 8s linear infinite;
      z-index:0;
    }

    @keyframes moveBg{
      0%{transform:translate(-10%,-10%) rotate(0deg)}
      100%{transform:translate(10%,10%) rotate(360deg)}
    }

    .page{
      width:100%;
      max-width:820px;
      position:relative;
      z-index:1;
    }

    .back-link{
      display:inline-block;
      text-decoration:none;
      color:#fff;
      background:rgba(0,255,150,0.3);
      padding:10px 18px;
      border-radius:999px;
      margin-bottom:16px;
      backdrop-filter:blur(10px);
      transition:.3s;
    }

    .back-link:hover{
      background:#00ff88;
      transform:scale(1.05);
    }

    .card{
      border-radius:30px;
      padding:28px;
      backdrop-filter:blur(25px);
      background:rgba(0,0,0,0.25);
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,0.1);
    }

    h1{
      margin:0 0 10px;
      font-size:38px;
      font-weight:900;
      background:linear-gradient(90deg,#00ff88,#ffffff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle{
      color:#cbd5e1;
      margin-bottom:18px;
    }

    textarea{
      width:100%;
      min-height:420px;
      border:none;
      outline:none;
      border-radius:25px;
      padding:22px;
      font-size:16px;
      line-height:1.8;
      color:#fff;
      background:linear-gradient(135deg,#2b0000,#5c0000,#ff3b00);
      box-shadow:
        inset 0 0 25px rgba(255,80,0,0.7),
        0 0 40px rgba(255,80,0,0.3);
      animation:fireGlow 2s infinite alternate;
    }

    @keyframes fireGlow{
      from{box-shadow:inset 0 0 20px rgba(255,80,0,0.5),0 0 20px rgba(255,80,0,0.2)}
      to{box-shadow:inset 0 0 35px rgba(255,120,0,0.9),0 0 50px rgba(255,120,0,0.5)}
    }

    .toolbar{
      display:flex;
      justify-content:space-between;
      margin-top:15px;
      flex-wrap:wrap;
      gap:10px;
    }

    button{
      border:none;
      border-radius:16px;
      padding:12px 20px;
      font-weight:900;
      cursor:pointer;
      transition:.25s;
    }

    .copy-btn{
      background:linear-gradient(135deg,#ff3b3b,#ff8c00);
      color:#fff;
      box-shadow:0 10px 30px rgba(255,80,0,0.6);
    }

    .clear-btn{
      background:rgba(255,255,255,0.1);
      color:#fff;
    }

    button:hover{
      transform:scale(1.08);
    }

  </style>
</head>
<body>
  <div class="page">
    <a class="back-link" href="index.html">⚡ رجوع</a>

    <div class="card">
      <h1>🔥 Capitalize Text</h1>
      <p class="subtitle">ستايل خرافي: أزرق كهربائي + نار متوهجة 🔥⚡</p>

      <textarea id="text" placeholder="اكتب هون..."></textarea>

      <div class="toolbar">
        <button class="clear-btn" id="clearBtn">مسح</button>
        <button class="copy-btn" id="copyBtn">📋 نسخ</button>
      </div>
    </div>
  </div>

  <script>
    const textEl = document.getElementById('text');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const exceptions = ["in","and","on","at","for","to","from","with","of"];

    function cap(str){
      if(str.length === 0) return str;
      return str[0].toUpperCase() + str.slice(1).toLowerCase();
    }

    function isLatinWord(token){
      return /[A-Za-z]/.test(token);
    }

    function titleCaseLine(line){
      return line.split(/(\s+)/).map((chunk, i, arr) => {
        if(/^\s+$/.test(chunk)) return chunk;
        const parts = chunk.split(/([\-/])/);
        const isLineStart = (() => {
          for(let j=i-1; j>=0; j--){
            if(!/^\s+$/.test(arr[j])) return false;
          }
          return true;
        })();
        return parts.map((p) => {
          if(p === '-' || p === '/') return p;
          if(!isLatinWord(p)) return p;
          const lower = p.toLowerCase();
          const shouldException = !isLineStart && exceptions.includes(lower);
          return shouldException ? lower : cap(p);
        }).join('');
      }).join('');
    }

    function convert(){
      const lines = textEl.value.split(/\r?\n/);
      textEl.value = lines.map(line => titleCaseLine(line)).join('\n');
    }

    textEl.addEventListener('input', convert);

    copyBtn.addEventListener('click', async ()=>{
      await navigator.clipboard.writeText(textEl.value);
      copyBtn.textContent = '🔥 تم النسخ';
      setTimeout(()=> copyBtn.textContent = '📋 نسخ', 1500);
    });

    clearBtn.addEventListener('click', ()=>{
      textEl.value = '';
    });
  </script>
</body>
</html>
