<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Capitalize Text</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:system-ui,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:24px;
  color:#fff;
  background:linear-gradient(135deg,#3a2a00,#a67c00,#ffd700);
}

.page{
  width:100%;
  max-width:800px;
}

.card{
  border-radius:30px;
  padding:28px;
  backdrop-filter:blur(20px);
  background:rgba(0,0,0,0.3);
  box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

h1{
  margin:0 0 15px;
  font-size:32px;
  background:linear-gradient(90deg,#ffd700,#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

textarea{
  width:100%;
  height:300px;
  border:none;
  border-radius:20px;
  padding:20px;
  font-size:16px;
  line-height:1.7;
  color:#fff;
  background:linear-gradient(135deg,#2b0000,#5c0000,#ff3b00);
  resize:vertical;
}

.toolbar{
  margin-top:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.copy-btn{
  background:#b8860b;
  color:#fff;
}

.clear-btn{
  background:#8b6f00;
  color:#fff;
}

#reaction{
  margin-top:10px;
  font-size:22px;
}

#warning{
  margin-top:8px;
  font-size:16px;
  color:#ff4444;
  display:none;
}
</style>
</head>

<body>
<div class="page">
  <div class="card">
    <h1>Capitalize Text</h1>

    <textarea id="text" placeholder="Type your text here..."></textarea>

    <div id="reaction">😴 Start typing...</div>
    <div id="warning">⚠️ There are multiple spaces between words</div>

    <div class="toolbar">
      <button class="clear-btn" id="clearBtn">Clear</button>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
  </div>
</div>

<script>
const textEl = document.getElementById('text');
const copyBtn = document.getElementById('copyBtn');
const clearBtn = document.getElementById('clearBtn');
const reaction = document.getElementById('reaction');
const warning = document.getElementById('warning');

const exceptions = ["in","and","on","at","for","to","from","with","of"];

function capWord(word){
  if(!word) return word;
  return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
}

function isLatinWord(token){
  return /[A-Za-z]/.test(token);
}

function transformToken(token, isStart){
  // Keep leading/trailing punctuation untouched, capitalize only the actual word part
  const match = token.match(/^([^A-Za-z]*)([A-Za-z]+(?:'[A-Za-z]+)?)([^A-Za-z]*)$/);
  if(!match) return token;

  const [, prefix, word, suffix] = match;
  const lower = word.toLowerCase();
  const converted = (!isStart && exceptions.includes(lower)) ? lower : capWord(word);

  return prefix + converted + suffix;
}

function titleCaseLine(line){
  return line.split(/(\s+)/).map((chunk, i, arr) => {
    if(/^\s+$/.test(chunk)) return chunk;

    const parts = chunk.split(/([\-/])/);

    const isLineStart = arr
      .slice(0, i)
      .every(c => /^[\s\(\[\{\"']*$/.test(c));

    return parts.map((part) => {
      if(part === '-' || part === '/') return part;
      if(!isLatinWord(part)) return part;
      return transformToken(part, isLineStart);
    }).join('');
  }).join('');
}

function updateReaction(text){
  const words = text.trim().split(/\s+/).filter(w => w.length > 0);

  if(words.length === 0){
    reaction.textContent = "😴 Start typing...";
    return;
  }

  if(words.length < 5){
    reaction.textContent = "😴 Easy";
  } else if(words.length < 12){
    reaction.textContent = "🙂 Medium";
  } else {
    reaction.textContent = "😵 Hard";
  }
}

function checkSpaces(text){
  warning.style.display = /\s{2,}/.test(text) ? "block" : "none";
}

function convert(){
  const start = textEl.selectionStart;
  const end = textEl.selectionEnd;
  const lines = textEl.value.split(/\r?\n/);
  const result = lines.map(line => titleCaseLine(line)).join('\n');

  textEl.value = result;
  try {
    textEl.setSelectionRange(start, end);
  } catch (e) {}

  updateReaction(result);
  checkSpaces(result);
}

textEl.addEventListener('input', convert);

copyBtn.addEventListener('click', async ()=>{
  await navigator.clipboard.writeText(textEl.value);
  copyBtn.textContent = '🔥 Copied';
  setTimeout(()=> copyBtn.textContent = 'Copy', 1500);
});

clearBtn.addEventListener('click', ()=>{
  textEl.value = '';
  updateReaction('');
  checkSpaces('');
});
</script>
</body>
</html>
